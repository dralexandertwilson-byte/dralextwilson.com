<style>
body {

  background: #F5F0E8;
  color: #1A1816;
  margin: 0;
  padding: 3rem 2rem;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 2rem;
  text-align: center;
  margin-bottom: .4rem;
}
.subtitle {
  text-align: center;
  color: #7A7068;
  font-size: .85rem;
  font-weight: 300;
  margin-bottom: 3.5rem;
}
.previews {
  display: flex;
  justify-content: center;
  gap: 4rem;
  flex-wrap: wrap;
  max-width: 900px;
  margin: 0 auto;
}
.card {
  border-radius: 16px;
  padding: 3.5rem 3rem 2.5rem;
  text-align: center;
  min-width: 260px;
}
.light { background: #fff; box-shadow: 0 2px 24px rgba(0,0,0,.05); }
.dark { background: #1A1816; }
.card h3 {

  font-weight: 400;

  margin-top: 2rem;
  margin-bottom: .3rem;
}
.light h3 { color: #1A1816; }
.dark h3 { color: #F5F0E8; }
.card p {
  font-size: .75rem;
  font-weight: 300;
  line-height: 1.5;
  margin: 0;
}
.light p { color: #7A7068; }
.dark p { color: rgba(245,240,232,.45); }

.size-row {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 3.5rem;
  margin-top: 3.5rem;
  padding: 3rem 2rem;
  background: white;
  border-radius: 16px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 2px 24px rgba(0,0,0,.04);

.size-item { text-align: center; }
.size-item span {

  color: #7A7068;
  margin-top: .75rem;
