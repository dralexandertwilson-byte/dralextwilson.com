<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A89880"/>
      <stop offset="100%" style="stop-color:#8C7B5E"/>
    </linearGradient>
  </defs>

  <!-- Phi vertical stroke — organic calligraphic curve (doubles as T stem) -->
  <path d="M100 16 C100 16, 101 60, 100.5 130 C100 200, 99.5 236, 100 244"
        stroke="url(#bronzeGrad)" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Calligraphic ellipse -->
  <path d="M100 72 C138 72, 168 94, 168 130 C168 166, 138 188, 100 188 C62 188, 32 166, 32 130 C32 94, 62 72, 100 72"
        stroke="url(#bronzeGrad)" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Top serif -->
  <line x1="92" y1="18" x2="108" y2="18" stroke="#8C7B5E" stroke-width="1" opacity="0.45"/>

  <!-- Bottom serif -->
  <line x1="92" y1="242" x2="108" y2="242" stroke="#8C7B5E" stroke-width="1" opacity="0.45"/>

  <!-- T crossbar — sits in upper portion of ellipse -->
  <line x1="86" y1="101" x2="114" y2="101" stroke="url(#bronzeGrad)" stroke-width="0.7"/>

  <!-- A — centered in left semicircle (center ~x66, y130) -->
  <path d="M53 155 L66 106 L79 155" stroke="url(#bronzeGrad)" stroke-width="0.9" fill="none" stroke-linejoin="round"/>
  <!-- A crossbar -->
  <line x1="57" y1="140" x2="75" y2="140" stroke="url(#bronzeGrad)" stroke-width="0.6"/>
  <!-- A base serifs -->
  <path d="M49 155 L53 155 L53 153" stroke="url(#bronzeGrad)" stroke-width="0.5" fill="none"/>
  <path d="M83 155 L79 155 L79 153" stroke="url(#bronzeGrad)" stroke-width="0.5" fill="none"/>

  <!-- W — centered in right semicircle (center ~x134, y130) -->
  <path d="M121 106 L128 155 L134 128 L140 155 L147 106" stroke="url(#bronzeGrad)" stroke-width="0.9" fill="none" stroke-linejoin="round"/>
  <!-- W top serifs -->
  <path d="M118 106 L121 106 L121 108" stroke="url(#bronzeGrad)" stroke-width="0.5" fill="none"/>
  <path d="M150 106 L147 106 L147 108" stroke="url(#bronzeGrad)" stroke-width="0.5" fill="none"/>
</svg>