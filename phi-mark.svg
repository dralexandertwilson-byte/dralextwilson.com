<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8C7B5E"/>
      <stop offset="50%" style="stop-color:#A89880"/>
      <stop offset="100%" style="stop-color:#8C7B5E"/>
    </linearGradient>
  </defs>

  <!-- Vertical stroke — elegant tapered line -->
  <path d="M100 12 C100 12, 101.2 60, 101 130 C100.8 200, 100 248, 100 248"
        stroke="url(#bronzeGrad)" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Upper taper flourish -->
  <path d="M100 12 C99 12, 98.5 14, 99 18"
        stroke="url(#bronzeGrad)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Ellipse — the phi's defining curve, slightly asymmetric for organic feel -->
  <ellipse cx="100" cy="130" rx="62" ry="52"
           stroke="url(#bronzeGrad)" stroke-width="2.2" fill="none"/>

  <!-- Inner ellipse — subtle double-line luxury detail -->
  <ellipse cx="100" cy="130" rx="52" ry="43"
           stroke="url(#bronzeGrad)" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- Small diamond accent at intersection top -->
  <path d="M100 78 L103 82 L100 86 L97 82 Z"
        fill="#8C7B5E" opacity="0.6"/>

  <!-- Small diamond accent at intersection bottom -->
  <path d="M100 174 L103 178 L100 182 L97 178 Z"
        fill="#8C7B5E" opacity="0.6"/>
</svg>